{% comment %}
Botón toggle claro/oscuro.
Requiere que toggleTheme() esté definido (lo define base_app.html en el <head>).
{% endcomment %}
<button onclick="toggleTheme()"
        type="button"
        title="Cambiar tema"
        aria-label="Cambiar entre tema claro y oscuro"
        class="p-2 rounded-lg text-[#5d5e66] dark:text-[#8b90a8]
               hover:bg-zinc-100 dark:hover:bg-white/[0.06]
               focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-primary dark:focus-visible:ring-[#adc7f7]
               transition-colors">
  <span class="material-symbols-outlined text-xl dark:hidden"
        style="font-variation-settings:'FILL' 0,'wght' 300,'GRAD' 0,'opsz' 24">dark_mode</span>
  <span class="material-symbols-outlined text-xl hidden dark:inline"
        style="font-variation-settings:'FILL' 1,'wght' 400,'GRAD' 0,'opsz' 24">light_mode</span>
</button>
