{% load tz %}
<footer class="hidden md:block border-t border-zinc-200 dark:border-white/[0.07] bg-white dark:bg-[#0f1121] mt-8">
  <div class="max-w-screen-xl mx-auto px-6 py-5 flex flex-col sm:flex-row justify-between items-center gap-3">

    <div class="flex items-center gap-2.5">
      <div class="w-6 h-6 rounded-md bg-primary/10 dark:bg-[#adc7f7]/10 flex items-center justify-center">
        <span class="material-symbols-outlined text-primary dark:text-[#adc7f7]" style="font-size:14px">church</span>
      </div>
      <p class="text-xs font-medium text-[#74777f] dark:text-[#8b90a8] uppercase tracking-widest">
        © {% now "Y" %} Iglesia Adventista — Osorno Central
      </p>
    </div>

    <div class="flex items-center gap-6 text-xs text-[#74777f] dark:text-[#8b90a8]">
      <a href="{% url 'calendar_app:calendar' %}"
         class="hover:text-primary dark:hover:text-[#adc7f7] transition-colors">Calendario</a>
      <a href="{% url 'calendar_app:event_list' %}"
         class="hover:text-primary dark:hover:text-[#adc7f7] transition-colors">Actividades</a>
      <a href="{% url 'calendar_app:tv' %}"
         class="hover:text-primary dark:hover:text-[#adc7f7] transition-colors">Vista TV</a>
      {% if user.is_authenticated and user.is_staff %}
      <a href="{% url 'admin:index' %}"
         class="hover:text-primary dark:hover:text-[#adc7f7] transition-colors">Admin</a>
      {% endif %}
      <span class="flex items-center gap-1 text-[#74777f] dark:text-[#8b90a8]">
        <span class="material-symbols-outlined" style="font-size:13px">location_on</span>
        Osorno, Chile
      </span>
    </div>

  </div>
</footer>
