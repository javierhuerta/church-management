<!-- Barra: navegación de mes + filtros -->
<div class="flex flex-wrap items-center gap-2 mb-5">

  <!-- Navegación de mes -->
  <button type="button" onclick="navigateMonth(-1)"
    class="p-2 rounded-lg text-[#5d5e66] dark:text-[#8b90a8]
           hover:bg-zinc-100 dark:hover:bg-white/[0.06] transition-colors"
    aria-label="Mes anterior">
    <span class="material-symbols-outlined">chevron_left</span>
  </button>

  <h1 class="text-2xl font-bold text-primary dark:text-[#adc7f7] px-1"
      style="font-family:'Noto Serif',serif">
    {{ month_name }} {{ year }}
  </h1>

  <button type="button" onclick="navigateMonth(1)"
    class="p-2 rounded-lg text-[#5d5e66] dark:text-[#8b90a8]
           hover:bg-zinc-100 dark:hover:bg-white/[0.06] transition-colors"
    aria-label="Mes siguiente">
    <span class="material-symbols-outlined">chevron_right</span>
  </button>

  <button type="button" onclick="goToday()"
    class="px-3 py-1.5 rounded-lg text-sm font-semibold
           text-[#5d5e66] dark:text-[#8b90a8]
           border border-zinc-200 dark:border-zinc-700
           hover:bg-zinc-50 dark:hover:bg-white/[0.04] transition-colors">
    Hoy
  </button>

  <div class="flex-1"></div>

  <!-- Filtro: Departamentos -->
  <div class="relative">
    <button type="button" data-dropdown-toggle="dept-dropdown"
      class="flex items-center gap-1.5 px-3 py-2 text-sm font-medium
             bg-white dark:bg-[#161929]
             border border-zinc-200 dark:border-zinc-700
             text-[#43474e] dark:text-[#c4c6cf]
             rounded-lg hover:bg-zinc-50 dark:hover:bg-white/[0.04] transition-colors">
      <span class="material-symbols-outlined text-base">groups</span>
      Departamentos
      {% if dept_filters %}
        <span class="bg-primary dark:bg-[#adc7f7] text-white dark:text-[#0d0f1a]
                     text-xs font-bold rounded-full w-5 h-5 flex items-center justify-center shrink-0">
          {{ dept_filters|length }}
        </span>
      {% endif %}
      <span class="material-symbols-outlined text-sm">expand_more</span>
    </button>
    <div id="dept-dropdown"
         class="z-30 hidden absolute top-full left-0 mt-1
                bg-white dark:bg-[#161929]
                rounded-xl shadow-lg border border-zinc-200 dark:border-zinc-700 w-56">
      <ul class="p-2 max-h-64 overflow-y-auto space-y-0.5">
        {% for dept in departments %}
        <li>
          <label class="flex items-center gap-2.5 px-3 py-2 rounded-lg
                        hover:bg-zinc-50 dark:hover:bg-white/[0.04]
                        cursor-pointer select-none">
            <input type="checkbox" name="dept" value="{{ dept.slug }}"
              {% if dept.slug in dept_filters %}checked{% endif %}
              class="w-4 h-4 rounded border-zinc-300 dark:border-zinc-600 accent-primary">
            <span class="w-2.5 h-2.5 rounded-full shrink-0"
                  style="background-color:{{ dept.color }}"></span>
            <span class="text-sm text-[#43474e] dark:text-[#c4c6cf]">{{ dept.name }}</span>
          </label>
        </li>
        {% endfor %}
      </ul>
      <div class="p-2 border-t border-zinc-100 dark:border-zinc-700/60 flex gap-2">
        <button type="button" onclick="clearFilter('dept')"
          class="flex-1 px-2 py-1.5 text-xs font-medium rounded-lg
                 text-[#5d5e66] dark:text-[#8b90a8]
                 border border-zinc-200 dark:border-zinc-700
                 hover:bg-zinc-50 dark:hover:bg-white/[0.04]">Limpiar</button>
        <button type="submit"
          class="flex-1 px-2 py-1.5 text-xs font-semibold
                 text-white bg-primary rounded-lg hover:opacity-90">Aplicar</button>
      </div>
    </div>
  </div>

  <!-- Filtro: Alcance -->
  <div class="relative">
    <button type="button" data-dropdown-toggle="scope-dropdown"
      class="flex items-center gap-1.5 px-3 py-2 text-sm font-medium
             bg-white dark:bg-[#161929]
             border border-zinc-200 dark:border-zinc-700
             text-[#43474e] dark:text-[#c4c6cf]
             rounded-lg hover:bg-zinc-50 dark:hover:bg-white/[0.04] transition-colors">
      <span class="material-symbols-outlined text-base">public</span>
      Alcance
      {% if scope_filters %}
        <span class="bg-primary dark:bg-[#adc7f7] text-white dark:text-[#0d0f1a]
                     text-xs font-bold rounded-full w-5 h-5 flex items-center justify-center shrink-0">
          {{ scope_filters|length }}
        </span>
      {% endif %}
      <span class="material-symbols-outlined text-sm">expand_more</span>
    </button>
    <div id="scope-dropdown"
         class="z-30 hidden absolute top-full left-0 mt-1
                bg-white dark:bg-[#161929]
                rounded-xl shadow-lg border border-zinc-200 dark:border-zinc-700 w-44">
      <ul class="p-2 space-y-0.5">
        {% for val, label in scope_options %}
        <li>
          <label class="flex items-center gap-2.5 px-3 py-2 rounded-lg
                        hover:bg-zinc-50 dark:hover:bg-white/[0.04]
                        cursor-pointer select-none">
            <input type="checkbox" name="scope" value="{{ val }}"
              {% if val in scope_filters %}checked{% endif %}
              class="w-4 h-4 rounded border-zinc-300 dark:border-zinc-600 accent-primary">
            <span class="text-sm text-[#43474e] dark:text-[#c4c6cf]">{{ label }}</span>
          </label>
        </li>
        {% endfor %}
      </ul>
      <div class="p-2 border-t border-zinc-100 dark:border-zinc-700/60 flex gap-2">
        <button type="button" onclick="clearFilter('scope')"
          class="flex-1 px-2 py-1.5 text-xs font-medium rounded-lg
                 text-[#5d5e66] dark:text-[#8b90a8]
                 border border-zinc-200 dark:border-zinc-700
                 hover:bg-zinc-50 dark:hover:bg-white/[0.04]">Limpiar</button>
        <button type="submit"
          class="flex-1 px-2 py-1.5 text-xs font-semibold
                 text-white bg-primary rounded-lg hover:opacity-90">Aplicar</button>
      </div>
    </div>
  </div>

  <!-- Filtro: Tipo de evento -->
  <div class="relative">
    <button type="button" data-dropdown-toggle="type-dropdown"
      class="flex items-center gap-1.5 px-3 py-2 text-sm font-medium
             bg-white dark:bg-[#161929]
             border border-zinc-200 dark:border-zinc-700
             text-[#43474e] dark:text-[#c4c6cf]
             rounded-lg hover:bg-zinc-50 dark:hover:bg-white/[0.04] transition-colors">
      <span class="material-symbols-outlined text-base">category</span>
      Tipo
      {% if type_filters %}
        <span class="bg-primary dark:bg-[#adc7f7] text-white dark:text-[#0d0f1a]
                     text-xs font-bold rounded-full w-5 h-5 flex items-center justify-center shrink-0">
          {{ type_filters|length }}
        </span>
      {% endif %}
      <span class="material-symbols-outlined text-sm">expand_more</span>
    </button>
    <div id="type-dropdown"
         class="z-30 hidden absolute top-full right-0 mt-1
                bg-white dark:bg-[#161929]
                rounded-xl shadow-lg border border-zinc-200 dark:border-zinc-700 w-44">
      <ul class="p-2 space-y-0.5">
        {% for val, label in event_type_options %}
        <li>
          <label class="flex items-center gap-2.5 px-3 py-2 rounded-lg
                        hover:bg-zinc-50 dark:hover:bg-white/[0.04]
                        cursor-pointer select-none">
            <input type="checkbox" name="type" value="{{ val }}"
              {% if val in type_filters %}checked{% endif %}
              class="w-4 h-4 rounded border-zinc-300 dark:border-zinc-600 accent-primary">
            <span class="text-sm text-[#43474e] dark:text-[#c4c6cf]">{{ label }}</span>
          </label>
        </li>
        {% endfor %}
      </ul>
      <div class="p-2 border-t border-zinc-100 dark:border-zinc-700/60 flex gap-2">
        <button type="button" onclick="clearFilter('type')"
          class="flex-1 px-2 py-1.5 text-xs font-medium rounded-lg
                 text-[#5d5e66] dark:text-[#8b90a8]
                 border border-zinc-200 dark:border-zinc-700
                 hover:bg-zinc-50 dark:hover:bg-white/[0.04]">Limpiar</button>
        <button type="submit"
          class="flex-1 px-2 py-1.5 text-xs font-semibold
                 text-white bg-primary rounded-lg hover:opacity-90">Aplicar</button>
      </div>
    </div>
  </div>

  <!-- Limpiar todos los filtros -->
  {% if dept_filters or scope_filters or type_filters %}
  <button type="button" onclick="clearAllFilters()"
    class="flex items-center gap-1 px-2 py-2
           text-[#74777f] dark:text-zinc-600
           hover:text-[#43474e] dark:hover:text-[#8b90a8] transition-colors"
    title="Limpiar todos los filtros">
    <span class="material-symbols-outlined text-base">filter_list_off</span>
  </button>
  {% endif %}

</div>
