<!-- Barra: navegación de mes + filtros -->
<div class="flex flex-wrap items-center gap-2 mb-4">

  <!-- Navegación de mes -->
  <button type="button" onclick="navigateMonth(-1)"
    class="p-2 rounded-lg hover:bg-zinc-100 transition-colors text-zinc-600" aria-label="Mes anterior">
    <span class="material-symbols-outlined">chevron_left</span>
  </button>
  <h1 class="text-xl font-bold text-primary" style="font-family:'Noto Serif',serif">
    {{ month_name }} {{ year }}
  </h1>
  <button type="button" onclick="navigateMonth(1)"
    class="p-2 rounded-lg hover:bg-zinc-100 transition-colors text-zinc-600" aria-label="Mes siguiente">
    <span class="material-symbols-outlined">chevron_right</span>
  </button>
  <button type="button" onclick="goToday()"
    class="px-3 py-1.5 rounded-lg text-xs font-semibold text-zinc-600 border border-zinc-200 hover:bg-zinc-50 transition-colors">
    Hoy
  </button>

  <div class="flex-1"></div>

  <!-- Filtro: Departamentos -->
  <div class="relative">
    <button type="button" data-dropdown-toggle="dept-dropdown"
      class="flex items-center gap-1.5 px-3 py-2 text-sm font-medium bg-white border border-zinc-300 rounded-lg hover:bg-zinc-50 text-zinc-700 transition-colors">
      <span class="material-symbols-outlined text-base">groups</span>
      Departamentos
      {% if dept_filters %}<span class="bg-primary text-white text-xs font-bold rounded-full w-5 h-5 flex items-center justify-center shrink-0">{{ dept_filters|length }}</span>{% endif %}
      <span class="material-symbols-outlined text-sm">expand_more</span>
    </button>
    <div id="dept-dropdown" class="z-30 hidden absolute top-full left-0 mt-1 bg-white rounded-xl shadow-lg border border-zinc-200 w-56">
      <ul class="p-2 max-h-64 overflow-y-auto space-y-0.5">
        {% for dept in departments %}
        <li>
          <label class="flex items-center gap-2.5 px-3 py-2 rounded-lg hover:bg-zinc-50 cursor-pointer select-none">
            <input type="checkbox" name="dept" value="{{ dept.slug }}"
              {% if dept.slug in dept_filters %}checked{% endif %}
              class="w-4 h-4 rounded border-zinc-300 accent-primary">
            <span class="w-2.5 h-2.5 rounded-full shrink-0" style="background-color:{{ dept.color }}"></span>
            <span class="text-sm text-zinc-700">{{ dept.name }}</span>
          </label>
        </li>
        {% endfor %}
      </ul>
      <div class="p-2 border-t border-zinc-100 flex gap-2">
        <button type="button" onclick="clearFilter('dept')"
          class="flex-1 px-2 py-1.5 text-xs font-medium text-zinc-600 rounded-lg border border-zinc-200 hover:bg-zinc-50">Limpiar</button>
        <button type="submit"
          class="flex-1 px-2 py-1.5 text-xs font-semibold text-white bg-primary rounded-lg hover:bg-primary/90">Aplicar</button>
      </div>
    </div>
  </div>

  <!-- Filtro: Alcance -->
  <div class="relative">
    <button type="button" data-dropdown-toggle="scope-dropdown"
      class="flex items-center gap-1.5 px-3 py-2 text-sm font-medium bg-white border border-zinc-300 rounded-lg hover:bg-zinc-50 text-zinc-700 transition-colors">
      <span class="material-symbols-outlined text-base">public</span>
      Alcance
      {% if scope_filters %}<span class="bg-primary text-white text-xs font-bold rounded-full w-5 h-5 flex items-center justify-center shrink-0">{{ scope_filters|length }}</span>{% endif %}
      <span class="material-symbols-outlined text-sm">expand_more</span>
    </button>
    <div id="scope-dropdown" class="z-30 hidden absolute top-full left-0 mt-1 bg-white rounded-xl shadow-lg border border-zinc-200 w-44">
      <ul class="p-2 space-y-0.5">
        {% for val, label in scope_options %}
        <li>
          <label class="flex items-center gap-2.5 px-3 py-2 rounded-lg hover:bg-zinc-50 cursor-pointer select-none">
            <input type="checkbox" name="scope" value="{{ val }}"
              {% if val in scope_filters %}checked{% endif %}
              class="w-4 h-4 rounded border-zinc-300 accent-primary">
            <span class="text-sm text-zinc-700">{{ label }}</span>
          </label>
        </li>
        {% endfor %}
      </ul>
      <div class="p-2 border-t border-zinc-100 flex gap-2">
        <button type="button" onclick="clearFilter('scope')"
          class="flex-1 px-2 py-1.5 text-xs font-medium text-zinc-600 rounded-lg border border-zinc-200 hover:bg-zinc-50">Limpiar</button>
        <button type="submit"
          class="flex-1 px-2 py-1.5 text-xs font-semibold text-white bg-primary rounded-lg hover:bg-primary/90">Aplicar</button>
      </div>
    </div>
  </div>

  <!-- Filtro: Tipo de evento -->
  <div class="relative">
    <button type="button" data-dropdown-toggle="type-dropdown"
      class="flex items-center gap-1.5 px-3 py-2 text-sm font-medium bg-white border border-zinc-300 rounded-lg hover:bg-zinc-50 text-zinc-700 transition-colors">
      <span class="material-symbols-outlined text-base">category</span>
      Tipo
      {% if type_filters %}<span class="bg-primary text-white text-xs font-bold rounded-full w-5 h-5 flex items-center justify-center shrink-0">{{ type_filters|length }}</span>{% endif %}
      <span class="material-symbols-outlined text-sm">expand_more</span>
    </button>
    <div id="type-dropdown" class="z-30 hidden absolute top-full right-0 mt-1 bg-white rounded-xl shadow-lg border border-zinc-200 w-44">
      <ul class="p-2 space-y-0.5">
        {% for val, label in event_type_options %}
        <li>
          <label class="flex items-center gap-2.5 px-3 py-2 rounded-lg hover:bg-zinc-50 cursor-pointer select-none">
            <input type="checkbox" name="type" value="{{ val }}"
              {% if val in type_filters %}checked{% endif %}
              class="w-4 h-4 rounded border-zinc-300 accent-primary">
            <span class="text-sm text-zinc-700">{{ label }}</span>
          </label>
        </li>
        {% endfor %}
      </ul>
      <div class="p-2 border-t border-zinc-100 flex gap-2">
        <button type="button" onclick="clearFilter('type')"
          class="flex-1 px-2 py-1.5 text-xs font-medium text-zinc-600 rounded-lg border border-zinc-200 hover:bg-zinc-50">Limpiar</button>
        <button type="submit"
          class="flex-1 px-2 py-1.5 text-xs font-semibold text-white bg-primary rounded-lg hover:bg-primary/90">Aplicar</button>
      </div>
    </div>
  </div>

  <!-- Limpiar todos los filtros -->
  {% if dept_filters or scope_filters or type_filters %}
  <button type="button" onclick="clearAllFilters()"
    class="flex items-center gap-1 px-2 py-2 text-zinc-400 hover:text-zinc-600 transition-colors" title="Limpiar todos los filtros">
    <span class="material-symbols-outlined text-base">filter_list_off</span>
  </button>
  {% endif %}

</div>
